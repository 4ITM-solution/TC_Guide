// 볼드 적용: textarea에서 선택된 텍스트를 <b>...</b>로 감싸기
function applyBold(textarea) {
  if (!textarea) return;
  const start = textarea.selectionStart;
  const end   = textarea.selectionEnd;
  if (start === end) { showToast('볼드 처리할 텍스트를 먼저 선택해주세요 👆', ''); return; }
  const selected = textarea.value.substring(start, end);
  const replacement = `<b>${selected}</b>`;
  textarea.value = textarea.value.substring(0, start) + replacement + textarea.value.substring(end);
  textarea.focus();
  textarea.setSelectionRange(start, start + replacement.length);
}

// ── GitHub API ──
async function githubGetFileSha(filename) {
  const token = getGithubToken();
  const res = await fetch(`https://api.github.com/repos/${GITHUB_REPO}/contents/${filename}?ref=${GITHUB_BRANCH}`, {
    headers: { 'Authorization': 'token ' + token, 'Accept': 'application/vnd.github.v3+json' }
  });
  if (res.status === 404) return null;
  if (!res.ok) throw new Error('GitHub 파일 정보 조회 실패: ' + res.status);
  const data = await res.json();
  return data.sha;
}

async function githubPushFile(filename, htmlContent, commitMsg) {
  const token = getGithubToken();
  if (!token) throw new Error('GitHub Token이 설정되지 않았습니다.\n오른쪽 상단 "GitHub 설정"에서 Token을 입력해주세요.');
  const sha = await githubGetFileSha(filename);
  const encoded = btoa(unescape(encodeURIComponent(htmlContent)));
  const body = {
    message: commitMsg || `Update ${filename} via Guideline Maker`,
    content: encoded,
    branch: GITHUB_BRANCH
  };
  if (sha) body.sha = sha;
  const res = await fetch(`https://api.github.com/repos/${GITHUB_REPO}/contents/${filename}`, {
    method: 'PUT',
    headers: {
      'Authorization': 'token ' + token,
      'Accept': 'application/vnd.github.v3+json',
      'Content-Type': 'application/json'
    },
    body: JSON.stringify(body)
  });
  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(err.message || 'GitHub push 실패: ' + res.status);
  }
  return await res.json();
}

      '.pill-blue': '.gl-pill-blue',
    };
    // 정규식으로 클래스명 치환 (단어 경계 기준)
    for (const [from, to] of Object.entries(classMap)) {
      const escaped = from.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
      css = css.replace(new RegExp(escaped + '(?=[\\s,{:>~+\\[)])', 'g'), to);
    }
    // :root를 .gl-detail 스코프로 교체 (변수 유지하면서 충돌 방지)
    css = css.replace(/:root\s*\{/g, '.gl-detail {');
    // \u2022 이스케이프 → 실제 문자로 복원 (CSS content 속성)
    css = css.replace(/\\u2022/g, '\u2022');
    // 편집 필드 기본 숨김 강제 적용
    css += '\n  .gl-edit-fields { display: none !important; }';
    css += '\n  .gl-edit-fields.visible { display: flex !important; }';
    const styleEl = document.getElementById('gl-preview-css');
    if (styleEl) styleEl.textContent = css;
  } catch(e) {
    console.warn('CSS 로드 실패, fallback 사용:', e.message);
  }
}

async function loadDetail(id) {
  showView('detail');
  const wrap = document.getElementById('gl-iframe-wrap');
  const toolbar = document.getElementById('toolbar-right');
  wrap.innerHTML = '<div class="loading-overlay"><div class="spinner"></div></div>';
  toolbar.innerHTML = '';

  try {
    const [glRows, cuts] = await Promise.all([
      sbFetch(`/rest/v1/gl_guidelines?id=eq.${id}&select=*,gl_products(*),gl_types(name)`),
      fetchCuts(id),
    ]);
    const gl = glRows[0];
    if (!gl) throw new Error('가이드라인을 찾을 수 없습니다.');
    const p = gl.gl_products || {};
    // product_id 필터로 정확히 조회 (전체 조회 후 JS 필터 방식 제거)
    const variants = p.id
      ? await sbFetch(`/rest/v1/gl_variants?product_id=eq.${p.id}&order=order.asc`).catch(() => [])
      : [];
    currentGl = gl;
    currentCuts = cuts;
    await loadGlPreviewCSS(p.brand);
    renderDetail(gl, p, cuts, variants);
  } catch (e) {
    wrap.innerHTML = `<div class="empty-state"><div class="icon">⚠️</div><div>${e.message}</div></div>`;
  }
}

      // USP pills
      const uspEl = container.querySelector('.js-usp-pills');
      if (uspEl && v.usp_pills?.length) uspEl.innerHTML = v.usp_pills.map(x=>`<span class="gl-pill">${x}</span>`).join('');
      // Ingredient pills
      const ingEl = container.querySelector('.js-ingredient-pills');
      if (ingEl && v.ingredient_pills?.length) ingEl.innerHTML = v.ingredient_pills.map(x=>`<span class="gl-pill gl-pill-blue">${x}</span>`).join('');
      // Texture notes
      const texEl = container.querySelector('.js-texture-notes');
      if (texEl && v.texture_notes) texEl.textContent = v.texture_notes;
      // Amazon 버튼
      const amazonBtn = container.querySelector('#gl-amazon-btn');
      const varLink = btn.dataset.link || v.footer_link || '';
      if (amazonBtn) { if (varLink) { amazonBtn.href = varLink; amazonBtn.style.display = 'inline-block'; } else { amazonBtn.style.display = 'none'; } }
    });
  });

  // ── 해시태그 / 멘션 편집 ──
  const hmEditBtn = container.querySelector('.js-hm-edit-btn');
  const hmEditFields = container.querySelector('.js-hm-edit-fields');
  if (hmEditBtn && hmEditFields) {
    hmEditBtn.addEventListener('click', () => {
      const isOpen = hmEditFields.classList.contains('visible');
      hmEditFields.classList.toggle('visible', !isOpen);
      hmEditBtn.textContent = isOpen ? '✏️ 편집' : '✖️ 닫기';
    });
    container.querySelector('.js-hm-cancel').addEventListener('click', () => {
      hmEditFields.classList.remove('visible');
      hmEditBtn.textContent = '✏️ 편집';
    });
    container.querySelector('.js-hm-save').addEventListener('click', async () => {
      const saveBtn = container.querySelector('.js-hm-save');
      saveBtn.disabled = true; saveBtn.textContent = '저장 중…';
      const newHashtags = container.querySelector('.js-hashtag-input').value.split('\n').map(s=>s.trim()).filter(Boolean);
      const newMentions = container.querySelector('.js-mention-input').value.split('\n').map(s=>s.trim()).filter(Boolean);
      try {
        await sbFetch(`/rest/v1/gl_guidelines?id=eq.${gl.id}`, {
          method: 'PATCH',
          body: JSON.stringify({ hashtags: newHashtags, mentions: newMentions })
        });
        // 뷰 업데이트
        const displayEl = container.querySelector('.js-hashtag-display');
        if (displayEl) displayEl.innerHTML = newHashtags.map(h=>`<span class="gl-hashtag">${h}</span>`).join('');
        const mentionDisplay = container.querySelector('.js-mention-display');
        if (mentionDisplay) mentionDisplay.innerHTML = newMentions.map(m=>`<div class="gl-mention-item"><span class="gl-mention-at">${m}</span><span style="color:#888;font-size:11px;margin-left:auto">Brand</span></div>`).join('');
        hmEditFields.classList.remove('visible');
        hmEditBtn.textContent = '✏️ 편집';
        showToast('✅ 해시태그/멘션 저장됨', 'success', 1800);
      } catch(e) {
        showToast('❌ 저장 실패: ' + e.message, 'error');
      } finally {
        saveBtn.disabled = false; saveBtn.textContent = '💾 저장';
      }
    });
  }

  // 제품 이미지 업로드
  const pbImgWrap = container.querySelector('#pb-img-wrap');
  const pbImgOverlay = container.querySelector('#pb-img-overlay');
  const pbImgUpload = container.querySelector('#pb-img-upload');
  pbImgOverlay.addEventListener('click', (e) => { e.stopPropagation(); pbImgUpload.click(); });
  pbImgUpload.addEventListener('change', async () => {
    const file = pbImgUpload.files[0];
    if (!file) return;
    pbImgWrap.style.opacity = '0.5';
    try {
      const storageUrl = await sbUpload(`cut-images/${gl.id}/product_img.jpg`, file);
      await updateProduct(p.id, { product_img_url: storageUrl });
      let img = container.querySelector('#pb-product-img');
      if (!img) {
        img = document.createElement('img');
        img.id = 'pb-product-img';
        container.querySelector('#pb-img-placeholder')?.remove();
        pbImgWrap.insertBefore(img, pbImgWrap.firstChild);
      }
      img.src = storageUrl + '?t=' + Date.now();
      showToast('🖼️ 제품 이미지 업로드 완료', 'success');
    } catch(e) {
      showToast('❌ 업로드 실패: ' + e.message, 'error');
    } finally {
      pbImgWrap.style.opacity = '';
    }
  });
}

// ── Cut Card Builder (원본 디자인 + 편집 오버레이) ──
function buildCutCard(cut) {
  const card = document.createElement('div');
  card.className = 'gl-cut-card';
  card.dataset.id = cut.id;

  const lblClass = cut.label === 'HOOK' || cut.label.startsWith('HOOK') ? 'gl-label-hook'
    : cut.label === 'RESULT' ? 'gl-label-result' : 'gl-label-cut';

  const imgHtml = cut.img_url
    ? `<img src="${cut.img_url}" alt="${cut.label}">`
    : `<div class="gl-cut-no-img">이미지 없음</div>`;

  let body = '';
  if (cut.main_usp) body += `<div><div class="gl-field-label">Main USP</div><div class="gl-field-usp">${cut.main_usp}</div></div>`;
  if (cut.production_method) {
    const steps = cut.production_method.split('\n').filter(s => s.trim());
    body += `<div><div class="gl-field-label">Production Method</div><div class="gl-field-pm"><ol>${steps.map(s => `<li>${s.replace(/^\d+\.\s*/,'')}</li>`).join('')}</ol></div></div>`;
  }
  if (cut.main_usp || cut.production_method) body += '<hr class="gl-cut-sep">';
  body += `<div><div class="gl-field-label">Scene</div><div class="gl-field-scene js-scene">${cut.scene || ''}</div></div>`;
  body += '<hr class="gl-cut-sep">';
  body += `<div><div class="gl-field-label">Direction</div><div class="gl-field-direction js-direction">${cut.direction || ''}</div></div>`;
  const captions = Array.isArray(cut.captions) ? cut.captions : [];
  if (captions.length) {
    body += '<hr class="gl-cut-sep">';
    body += `<div><div class="gl-field-label">Caption Options</div><div class="gl-caption-options">${captions.map(c => `<div class="gl-caption-opt">${c}</div>`).join('')}</div></div>`;
  }
  if (cut.tip) {
    const tipItems = cut.tip.split('/').map(t => t.trim()).filter(Boolean);
    body += '<hr class="gl-cut-sep">';
    body += `<div><div class="gl-field-label" style="color:#c47f00">&#x1F4A1; Filming Tip</div><div style="display:flex;flex-direction:column;gap:6px;margin-top:4px">${tipItems.map(t => `<div style="background:#fff8e6;border:1.5px solid #f5c842;border-radius:8px;padding:8px 12px;font-size:12px;color:#7a5200;line-height:1.6">${t}</div>`).join('')}</div></div>`;
  }

  const captionsText = captions.join('\n');

  card.innerHTML = `
    <div class="gl-cut-inner">
      <div class="gl-cut-img-wrap">
        ${imgHtml}
        <div class="gl-cut-badge-row">
          <span class="gl-cut-label ${lblClass}">${cut.label}</span>
          ${cut.pacing ? `<span class="gl-cut-ts">${cut.pacing}</span>` : ''}
        </div>
        <div class="gl-img-overlay">📤<span style="font-size:10px">이미지 변경</span></div>
        <input type="file" class="gl-img-upload-input" accept="image/*">
      </div>
      <div class="gl-cut-body">
        <button class="gl-edit-btn js-edit-btn">✏️ 편집</button>
        ${body}
      </div>
    </div>
    <div class="gl-edit-fields">
      <div>
        <div class="edit-label">Scene</div>
        <input class="edit-input" name="scene" value="${(cut.scene || '').replace(/"/g, '&quot;')}">
      </div>
      <div>
        <div class="edit-label">Direction</div>
        <div class="bold-toolbar">
          <button type="button" class="btn-bold" onclick="applyBold(this.closest('.gl-edit-fields').querySelector('[name=direction]'))"><b>B</b> Bold</button>
        </div>
        <textarea class="edit-textarea" name="direction">${cut.direction || ''}</textarea>
      </div>
      <div>
        <div class="edit-label">Captions (줄바꿈으로 구분)</div>
        <textarea class="edit-textarea" name="captions">${captionsText}</textarea>
      </div>
      ${cut.label.startsWith('HOOK') ? `
      <div>
        <div class="edit-label">Main USP</div>
        <input class="edit-input" name="main_usp" value="${(cut.main_usp || '').replace(/"/g, '&quot;')}">
      </div>
      <div>
        <div class="edit-label">Production Method (줄바꿈으로 구분)</div>
        <div class="bold-toolbar">
          <button type="button" class="btn-bold" onclick="applyBold(this.closest('.gl-edit-fields').querySelector('[name=production_method]'))"><b>B</b> Bold</button>
        </div>
        <textarea class="edit-textarea" name="production_method">${cut.production_method || ''}</textarea>
      </div>` : ''}
      <div>
        <div class="edit-label">&#x1F4A1; Filming Tip (여러 개는 / 로 구분)</div>
        <textarea class="edit-textarea" name="tip">${cut.tip || ''}</textarea>
      </div>
      <div class="cut-edit-actions">
        <button class="btn-cancel-cut">취소</button>
        <button class="btn-save-cut">💾 저장</button>
      </div>
    </div>
  `;

  // 편집 토글
  const editBtn = card.querySelector('.js-edit-btn');
  const editFields = card.querySelector('.gl-edit-fields');
  editBtn.addEventListener('click', () => {
    const isEditing = editFields.classList.contains('visible');
    editFields.classList.toggle('visible', !isEditing);
    card.classList.toggle('editing', !isEditing);
    editBtn.textContent = isEditing ? '✏️ 편집' : '✖️ 닫기';
  });

  // 취소
  card.querySelector('.btn-cancel-cut').addEventListener('click', () => {
    editFields.classList.remove('visible');
    card.classList.remove('editing');
    editBtn.textContent = '✏️ 편집';
  });

  // 저장
  card.querySelector('.btn-save-cut').addEventListener('click', async () => {
    const saveBtn = card.querySelector('.btn-save-cut');
    saveBtn.disabled = true;
    saveBtn.textContent = '저장 중…';

    const fields = {
      scene: card.querySelector('[name="scene"]').value.trim(),
      direction: card.querySelector('[name="direction"]').value.trim(),
      captions: card.querySelector('[name="captions"]').value.split('\n').map(s => s.trim()).filter(Boolean),
    };
    const mainUspEl = card.querySelector('[name="main_usp"]');
    const pmEl = card.querySelector('[name="production_method"]');
    const tipEl = card.querySelector('[name="tip"]');
    if (mainUspEl) fields.main_usp = mainUspEl.value.trim();
    if (pmEl) fields.production_method = pmEl.value.trim();
    if (tipEl) fields.tip = tipEl.value.trim() || null;

    try {
      await updateCut(cut.id, fields);
      // 뷰 업데이트
      const sceneEl = card.querySelector('.js-scene');
      const dirEl = card.querySelector('.js-direction');
      if (sceneEl) sceneEl.textContent = fields.scene;
      if (dirEl) dirEl.textContent = fields.direction;
      editFields.classList.remove('visible');
      card.classList.remove('editing');
      editBtn.textContent = '✏️ 편집';
      showToast('✅ 저장됨', 'success', 1800);
    } catch(e) {
      showToast('❌ 저장 실패: ' + e.message, 'error');
    } finally {
      saveBtn.disabled = false;
      saveBtn.textContent = '💾 저장';
    }
  });

  // 이미지 업로드
  const imgOverlay = card.querySelector('.gl-img-overlay');
  const fileInput = card.querySelector('.gl-img-upload-input');
  const imgWrap = card.querySelector('.gl-cut-img-wrap');
  imgOverlay.addEventListener('click', () => fileInput.click());
  fileInput.addEventListener('change', async () => {
    const file = fileInput.files[0];
    if (!file) return;
    imgWrap.style.opacity = '0.5';
    try {
      const slug = currentGl.id;
      const storageUrl = await sbUpload(`cut-images/${slug}/cut_${String(cut.order || 0).padStart(2,'0')}.jpg`, file);
      await updateCut(cut.id, { img_url: storageUrl });
      let img = imgWrap.querySelector('img');
      if (!img) {
        img = document.createElement('img');
        imgWrap.querySelector('.gl-cut-no-img')?.remove();
        imgWrap.insertBefore(img, imgWrap.firstChild);
      }
      img.src = storageUrl + '?t=' + Date.now();
      showToast('🖼️ 이미지 업로드 완료', 'success');
    } catch(e) {
      showToast('❌ 업로드 실패: ' + e.message, 'error');
    } finally {
      imgWrap.style.opacity = '';
    }
  });

  return card;
}

// ── Back button ──
document.getElementById('btn-back').addEventListener('click', () => {
  currentGl = null;
  currentCuts = [];
  showView('dashboard');
  loadDashboard();
});

// ── Init ──
(function init() {
  updateTokenStatus();
  if (getSession()) {
    showApp();
    loadDashboard();
  }
})();
</script>

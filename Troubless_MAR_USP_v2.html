<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Summer Glow-Boost Makeup 🌸Troubless Centella Sun Cream SPF50+</title>
<style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --pink:#FF6B9D;--pink-dark:#E8447A;--pink-light:#FFE8F2;--pink-mid:#FFB3D0;
      --blue:#1A73E8;--green:#2ED573;--gold:#FFA502;--red:#FF4757;
      --text:#1e1e2e;--muted:#888;--bg:#f7f7fa;--card:#fff;
      --radius:14px;
    }
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

    /* HEADER */
    .site-header{
      background:linear-gradient(135deg,var(--pink) 0%,var(--pink-dark) 100%);
      color:#fff;padding:22px 18px 20px;text-align:center;
    }
    .header-badge{
      display:inline-block;background:rgba(255,255,255,0.2);
      border:1px solid rgba(255,255,255,0.45);color:#fff;
      font-size:10px;font-weight:800;letter-spacing:1.8px;text-transform:uppercase;
      padding:4px 14px;border-radius:100px;margin-bottom:12px;
    }
    .site-header h1{font-size:clamp(18px,5vw,26px);font-weight:900;line-height:1.25;letter-spacing:-0.3px}
    .header-concept{font-size:13px;color:rgba(255,255,255,0.82);margin-top:6px;font-weight:500}

    /* CUTS */
    .cuts-section{padding:16px 16px 32px}
    .cuts-section-label{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:12px}
    .cuts-list{display:flex;flex-direction:column;gap:14px}

    .cut-card{background:var(--card);border-radius:var(--radius);overflow:hidden;box-shadow:0 2px 14px rgba(0,0,0,0.07)}
    .cut-inner{display:flex;flex-direction:column}
    @media(min-width:600px){
      .cut-inner{flex-direction:row;align-items:stretch}
      .cut-img-wrap{width:240px;flex-shrink:0}
    }
    .cut-img-wrap{position:relative;background:#f0f0f0;overflow:hidden}
    .cut-img-wrap img{width:100%;display:block;aspect-ratio:9/16;object-fit:cover;max-height:320px}
    @media(min-width:600px){.cut-img-wrap img{aspect-ratio:auto;height:100%;max-height:none}}
    .cut-no-img{width:100%;aspect-ratio:9/16;max-height:320px;display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:13px;background:#f5f5f8}
    @media(min-width:600px){.cut-no-img{height:100%;max-height:none;aspect-ratio:auto}}
    .cut-badge-row{position:absolute;top:8px;left:8px;display:flex;gap:6px;align-items:center}
    .cut-label{font-size:9px;font-weight:800;letter-spacing:1px;text-transform:uppercase;padding:3px 9px;border-radius:100px}
    .label-hook{background:#FF4757;color:#fff}
    .label-result{background:#2ED573;color:#fff}
    .label-cut{background:rgba(0,0,0,0.55);color:#fff}
    .cut-ts{font-size:10px;color:rgba(255,255,255,0.9);background:rgba(0,0,0,0.45);padding:2px 7px;border-radius:100px;font-weight:600}

    .cut-body{padding:16px;flex:1;display:flex;flex-direction:column;gap:10px}
    .field-label{font-size:9px;font-weight:800;letter-spacing:1.2px;text-transform:uppercase;color:var(--muted);margin-bottom:4px}
    .field-scene{font-size:15px;font-weight:800;line-height:1.3;color:var(--text)}
    .field-usp{font-size:13px;font-weight:700;color:var(--pink-dark);line-height:1.4}
    .field-direction{font-size:12px;line-height:1.65;color:#444}
    .field-pm ol{padding-left:16px}
    .field-pm li{font-size:12px;line-height:1.6;color:#444;margin-bottom:2px}
    .cut-sep{border:none;border-top:1px solid #f0f0f0}

    .caption-options{display:flex;flex-direction:column;gap:6px}
    .caption-opt{background:var(--pink-light);border-radius:8px;padding:7px 10px}
    .caption-opt span{font-size:12px;color:var(--pink-dark);font-weight:600;line-height:1.5}

    /* LOADING */
    .loading-state{text-align:center;padding:60px 20px;color:var(--muted);font-size:14px}
    .spinner{display:inline-block;width:24px;height:24px;border:3px solid #ffd6e8;border-top-color:var(--pink);border-radius:50%;animation:spin 0.7s linear infinite;margin-bottom:12px}
    @keyframes spin{to{transform:rotate(360deg)}}
    .error-state{text-align:center;padding:60px 20px;color:#e05555;font-size:14px}
</style>
</head>
<body>

<header class="site-header">
  <div class="header-badge">TROUBLESS · USP GUIDELINE</div>
  <h1 id="gl-title">로딩 중…</h1>
  <div class="header-concept" id="gl-product">로딩 중…</div>
</header>

<section class="cuts-section">
  <div class="cuts-section-label">CUT GUIDE</div>
  <div class="cuts-list" id="cuts-wrap">
    <div class="loading-state">
      <div class="spinner"></div>
      <div>가이드라인 불러오는 중…</div>
    </div>
  </div>
</section>

<script>
const SUPABASE_URL = 'https://dynqedcbmanvyfdlruni.supabase.co';
const ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImR5bnFlZGNibWFudnlmZGxydW5pIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjQxMzA1NDYsImV4cCI6MjA3OTcwNjU0Nn0.gqr_SArOEaJ3kuzeOTu03OOj5QT2G96XobBIONQlpPQ';
const GUIDELINE_ID = '87465f9f-a941-435c-ad66-05bc09579468';

async function sbGet(path) {
  const res = await fetch(SUPABASE_URL + path, {
    headers: {
      'apikey': ANON_KEY,
      'Authorization': 'Bearer ' + ANON_KEY,
      'Content-Type': 'application/json',
    }
  });
  if (!res.ok) throw new Error('DB 오류 ' + res.status);
  return res.json();
}

function labelClass(label) {
  if (label === 'HOOK' || label.startsWith('HOOK')) return 'cut-label label-hook';
  if (label === 'RESULT') return 'cut-label label-result';
  return 'cut-label label-cut';
}

function buildCard(cut) {
  const card = document.createElement('div');
  card.className = 'cut-card';
  card.dataset.id = cut.id;

  const imgHtml = cut.img_url
    ? `<img src="${cut.img_url}" alt="${cut.label}" />`
    : `<div class="cut-no-img">이미지 없음</div>`;

  let body = '';

  if (cut.main_usp) {
    body += `<div><div class="field-label">Main USP</div><div class="field-usp" data-f="main_usp">${cut.main_usp}</div></div>`;
  }
  if (cut.production_method) {
    const steps = cut.production_method.split('\n').filter(s => s.trim());
    const lis = steps.map((s, i) => `<li>${s.replace(/^\d+\.\s*/, '')}</li>`).join('');
    body += `<div><div class="field-label">Production Method</div><div class="field-pm"><ol data-f="production_method">${lis}</ol></div></div>`;
  }
  if (cut.main_usp || cut.production_method) body += '<hr class="cut-sep">';

  body += `<div><div class="field-label">Scene</div><div class="field-scene" data-f="scene">${cut.scene || ''}</div></div>`;
  body += '<hr class="cut-sep">';
  body += `<div><div class="field-label">Direction</div><div class="field-direction" data-f="direction">${cut.direction || ''}</div></div>`;

  const captions = Array.isArray(cut.captions) ? cut.captions : [];
  if (captions.length) {
    body += '<hr class="cut-sep">';
    const capHtml = captions.map(c => `<div class="caption-opt"><span data-f="caption">${c}</span></div>`).join('');
    body += `<div><div class="field-label">Caption Options</div><div class="caption-options">${capHtml}</div></div>`;
  }

  card.innerHTML = `
    <div class="cut-inner">
      <div class="cut-img-wrap">
        ${imgHtml}
        <div class="cut-badge-row">
          <span class="${labelClass(cut.label)}">${cut.label}</span>
        </div>
      </div>
      <div class="cut-body">${body}</div>
    </div>`;
  return card;
}

async function init() {
  const wrap = document.getElementById('cuts-wrap');
  try {
    const [glRows, cuts] = await Promise.all([
      sbGet(`/rest/v1/gl_guidelines?id=eq.${GUIDELINE_ID}&select=*,gl_products(name,brand)`),
      sbGet(`/rest/v1/gl_cuts?guideline_id=eq.${GUIDELINE_ID}&order=order.asc`)
    ]);
    const gl = glRows[0];
    if (!gl) throw new Error('가이드라인을 찾을 수 없습니다');

    document.getElementById('gl-title').textContent = gl.angle_name || '';
    document.getElementById('gl-product').textContent =
      (gl.gl_products?.brand || '') + ' · ' + (gl.gl_products?.name || '');

    wrap.innerHTML = '';
    cuts.forEach(cut => wrap.appendChild(buildCard(cut)));
  } catch(e) {
    wrap.innerHTML = `<div class="error-state">⚠️ ${e.message}</div>`;
  }
}

init();
</script>
</body>
</html>
